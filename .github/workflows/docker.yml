name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/svxreflectordashboard-web
  AUDIO_IMAGE: ghcr.io/${{ github.repository_owner }}/svxreflectordashboard-audio-bridge
  XLX_IMAGE: ghcr.io/${{ github.repository_owner }}/svxreflectordashboard-xlx-bridge
  DMR_IMAGE: ghcr.io/${{ github.repository_owner }}/svxreflectordashboard-dmr-bridge
  YSF_IMAGE: ghcr.io/${{ github.repository_owner }}/svxreflectordashboard-ysf-bridge
  ALLSTAR_IMAGE: ghcr.io/${{ github.repository_owner }}/svxreflectordashboard-allstar-bridge
  ZELLO_IMAGE: ghcr.io/${{ github.repository_owner }}/svxreflectordashboard-zello-bridge
  IAX_IMAGE: ghcr.io/${{ github.repository_owner }}/svxreflectordashboard-iax-bridge
  SIP_IMAGE: ghcr.io/${{ github.repository_owner }}/svxreflectordashboard-sip-bridge
  USRP_IMAGE: ghcr.io/${{ github.repository_owner }}/svxreflectordashboard-usrp-bridge
  MUMBLE_BRIDGE_IMAGE: ghcr.io/${{ github.repository_owner }}/svxreflectordashboard-mumble-bridge
  MUMBLE_IMAGE: ghcr.io/${{ github.repository_owner }}/svxreflectordashboard-mumble
  PLATFORMS: linux/amd64,linux/arm64

permissions:
  contents: read
  packages: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate REVISION and changelog
        run: |
          git rev-parse HEAD > public/REVISION
          ruby -rjson -e '
            grouped = {}
            `git log --format="%h\t%ai\t%s" --no-merges`.each_line do |l|
              sha, date, msg = l.strip.split("\t", 3)
              next unless sha && date && msg
              d = date[0,10]
              (grouped[d] ||= []) << {sha: sha, message: msg}
            end
            File.write("public/changelog.json", JSON.pretty_generate(
              grouped.map { |d, cs| {date: d, commits: cs} }
            ))
          '

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-audio-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
