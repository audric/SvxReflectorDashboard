x-rails-env: &rails-env
  RAILS_ENV: production
  REFLECTOR_STATUS_URL: ${REFLECTOR_STATUS_URL:-http://svxreflector:8080/status}
  REDIS_URL: redis://redis:6379/1
  DOMAIN: ${DOMAIN:-localhost}

services:

  # Ensures reflector config file exists on the host before other services mount it.
  # On a fresh clone the reflector/ dir may not exist, causing bind-mount failures.
  init-reflector-conf:
    image: alpine
    entrypoint: /bin/sh
    command: ["-c", "test -d /h/svxreflector.conf && rm -rf /h/svxreflector.conf; test -f /h/svxreflector.conf || printf '[GLOBAL]\\nLISTEN_PORT=5300\\nHTTP_SRV_PORT=8080\\nSQL_TIMEOUT=5000\\n\\n[SERVER_CERT]\\nCOMMON_NAME=svxreflector\\n' > /h/svxreflector.conf"]
    volumes:
      - ./reflector:/h

  svxreflector:
    image: audric/svxlink
    build: https://github.com/audric/svxlink-docker.git
    ports:
      - "5300:5300/tcp"
      - "5300:5300/udp"
    expose:
      - "8080"
    environment:
      START_SVXLINK: 0
      START_REMOTETRX: 0
      START_SVXREFLECTOR: 1
      SVXREFLECTOR_CONF: /etc/svxlink/svxreflector.conf
    volumes:
      - ./reflector:/mnt/reflector
      - reflector_pki:/var/lib/svxlink/pki
    entrypoint: ["/bin/sh", "-c", "cp /mnt/reflector/svxreflector.conf /etc/svxlink/svxreflector.conf; exec /entrypoint.sh"]
    restart: unless-stopped
    depends_on:
      init-reflector-conf:
        condition: service_completed_successfully

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - web
    restart: unless-stopped

  web:
    image: audric/svxreflectordashboard_web
    build: .
    expose:
      - "3000"
    env_file: .env
    environment:
      <<: *rails-env
    volumes:
      - db_data:/rails/storage
      - ./reflector:/rails/reflector
      - ./bridge:/rails/bridge
      - reflector_pki:/rails/reflector_pki:ro
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      init-reflector-conf:
        condition: service_completed_successfully
      redis:
        condition: service_started
      svxreflector:
        condition: service_started

  updater:
    image: audric/svxreflectordashboard_updater
    build: .
    command: bash -lc "bundle exec rails runner 'require Rails.root.join(\"lib\",\"reflector_listener\").to_s; ReflectorListener.start; sleep'"
    env_file: .env
    environment:
      <<: *rails-env
    volumes:
      - db_data:/rails/storage
    depends_on:
      - web
      - redis
      - svxreflector

  audio_bridge:
    build: ./audio_bridge
    network_mode: host
    env_file: .env
    environment:
      REFLECTOR_HOST: ${REFLECTOR_HOST:-svxreflector}
      REFLECTOR_PORT: ${REFLECTOR_PORT:-5300}
      REDIS_URL: redis://localhost:6379/1
    depends_on:
      - redis
      - svxreflector
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  db_data:
  reflector_pki:
  caddy_data:
