
services:

  svxreflector:
    image: f4hlv/svxlink
    build: https://github.com/f4hlv/svxlink-docker.git
    ports:
      - "5300:5300/tcp"
      - "5300:5300/udp"
      - "8080:8080"
    environment:
      START_SVXLINK: 0
      START_REMOTETRX: 0
      START_SVXREFLECTOR: 1
      SVXREFLECTOR_CONF: /etc/svxlink/svxreflector.conf
    volumes:
      - ./reflector/svxreflector.conf:/etc/svxlink/svxreflector.conf
      - reflector_pki:/var/lib/svxlink/pki
    restart: unless-stopped

  web:
    image: audric/svxreflectordashboard_web
    build: .
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: production
      ALLOWED_HOST: ${ALLOWED_HOST}
      BRAND_NAME: ${BRAND_NAME}
      REFLECTOR_STATUS_URL: ${REFLECTOR_STATUS_URL:-http://svxreflector:8080/status}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    volumes:
      - db_data:/rails/storage
      - ./reflector/svxreflector.conf:/rails/reflector/svxreflector.conf
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - svxreflector

  updater:
    image: audric/svxreflectordashboard_updater
    build: .
    command: bash -lc "bundle exec rails runner 'require Rails.root.join(\"lib\",\"reflector_listener\").to_s; ReflectorListener.start; sleep'"
    environment:
      RAILS_ENV: production
      REFLECTOR_STATUS_URL: ${REFLECTOR_STATUS_URL:-http://svxreflector:8080/status}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    volumes:
      - db_data:/rails/storage
    depends_on:
      - web
      - redis
      - svxreflector

  audio_bridge:
    build: ./audio_bridge
    network_mode: host
    environment:
      REFLECTOR_HOST: ${REFLECTOR_HOST:-svxreflector}
      REFLECTOR_PORT: ${REFLECTOR_PORT:-5300}
      REDIS_URL: redis://localhost:6379/1
    depends_on:
      - redis
      - svxreflector
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  db_data:
  reflector_pki:
