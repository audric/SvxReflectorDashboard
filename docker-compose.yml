x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-rails-env: &rails-env
  RAILS_ENV: production
  REFLECTOR_STATUS_URL: ${REFLECTOR_STATUS_URL:-http://svxreflector:8080/status}
  REDIS_URL: redis://redis:6379/1
  DOMAIN: ${DOMAIN:-localhost}

services:

  # Ensures reflector config file exists on the host before other services mount it.
  # On a fresh clone the reflector/ dir may not exist, causing bind-mount failures.
  init-reflector-conf:
    image: alpine
    entrypoint: /bin/sh
    command: ["-c", "test -d /h/svxreflector.conf && rm -rf /h/svxreflector.conf; test -f /h/svxreflector.conf || printf '[GLOBAL]\\nLISTEN_PORT=5300\\nHTTP_SRV_PORT=8080\\nSQL_TIMEOUT=5000\\nCOMMAND_PTY=/dev/shm/reflector_ctrl\\n\\n[SERVER_CERT]\\nCOMMON_NAME=svxreflector\\n' > /h/svxreflector.conf"]
    volumes:
      - ./reflector:/h

  svxreflector:
    image: ghcr.io/audric/svxlink-docker
    build: https://github.com/audric/svxlink-docker.git
    logging: *default-logging
    ports:
      - "5300:5300/tcp"
      - "5300:5300/udp"
      - "5302:5302/tcp"   # GeuReflector trunk link port
      - "5303:5303/tcp"   # GeuReflector satellite port
    expose:
      - "8080"
    environment:
      START_SVXLINK: 0
      START_REMOTETRX: 0
      START_SVXREFLECTOR: 1
      SVXREFLECTOR_CONF: /etc/svxlink/svxreflector.conf
    volumes:
      - ./reflector:/mnt/reflector
      - reflector_pki:/var/lib/svxlink/pki
    entrypoint: ["/bin/sh", "-c", "cp /mnt/reflector/svxreflector.conf /etc/svxlink/svxreflector.conf; exec /entrypoint.sh"]
    restart: unless-stopped
    depends_on:
      init-reflector-conf:
        condition: service_completed_successfully
      mqtt:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - web
      - svxreflector
    restart: unless-stopped

  web:
    image: ghcr.io/audric/svxreflectordashboard-web
    build: .
    logging: *default-logging
    expose:
      - "3000"
    env_file: .env
    environment:
      <<: *rails-env
    volumes:
      - db_data:/rails/storage
      - ./reflector:/rails/reflector
      - ./bridge:/rails/bridge
      - reflector_pki:/rails/reflector_pki:ro
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      init-reflector-conf:
        condition: service_completed_successfully
      redis:
        condition: service_started
      svxreflector:
        condition: service_started

  updater:
    image: ghcr.io/audric/svxreflectordashboard-web
    build: .
    logging: *default-logging
    command: bash -lc "bundle exec rails runner 'require Rails.root.join(\"lib\",\"reflector_listener\").to_s; ReflectorListener.start; sleep'"
    env_file: .env
    environment:
      <<: *rails-env
    volumes:
      - db_data:/rails/storage
      - ./reflector:/rails/reflector
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_started
      svxreflector:
        condition: service_started
      mqtt:
        condition: service_healthy

  audio_bridge:
    image: ghcr.io/audric/svxreflectordashboard-audio-bridge
    build: ./audio_bridge
    logging: *default-logging
    network_mode: host
    env_file: .env
    environment:
      REFLECTOR_HOST: ${REFLECTOR_HOST:-svxreflector}
      REFLECTOR_PORT: ${REFLECTOR_PORT:-5300}
      REDIS_URL: redis://localhost:6379/1
    depends_on:
      - redis
      - svxreflector
    restart: unless-stopped

  xlx_bridge:
    image: ghcr.io/audric/svxreflectordashboard-xlx-bridge
    build: ./xlx_bridge
    profiles: ["build-only"]

  dmr_bridge:
    image: ghcr.io/audric/svxreflectordashboard-dmr-bridge
    build: ./dmr_bridge
    profiles: ["build-only"]

  ysf_bridge:
    image: ghcr.io/audric/svxreflectordashboard-ysf-bridge
    build: ./ysf_bridge
    profiles: ["build-only"]

  allstar_bridge:
    image: ghcr.io/audric/svxreflectordashboard-allstar-bridge
    build: ./allstar_bridge
    profiles: ["build-only"]

  iax_bridge:
    image: ghcr.io/audric/svxreflectordashboard-iax-bridge
    build: ./iax_bridge
    profiles: ["build-only"]

  sip_bridge:
    image: ghcr.io/audric/svxreflectordashboard-sip-bridge
    build: ./sip_bridge
    profiles: ["build-only"]

  mqtt:
    image: eclipse-mosquitto:2
    logging: *default-logging
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ -n "$$MQTT_USERNAME" ] && [ -n "$$MQTT_PASSWORD" ]; then
          rm -f /mosquitto/data/passwd
          mosquitto_passwd -c -b /mosquitto/data/passwd "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
        else
          : > /mosquitto/data/passwd
        fi
        chown mosquitto:mosquitto /mosquitto/data/passwd
        chmod 600 /mosquitto/data/passwd
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
    expose:
      - "1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -u \"$$MQTT_USERNAME\" -P \"$$MQTT_PASSWORD\" -t '$$SYS/broker/uptime' -C 1 -W 3"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 5s

  redis:
    image: redis:7-alpine
    logging: *default-logging
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  db_data:
  reflector_pki:
  caddy_data:
  mqtt_data:
