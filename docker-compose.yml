
services:

  web:
    image: audric/svxreflectordashboard_web
    build: .
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: production
      ALLOWED_HOST: ${ALLOWED_HOST}
      BRAND_NAME: ${BRAND_NAME}
      REFLECTOR_STATUS_URL: ${REFLECTOR_STATUS_URL}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    volumes:
      - db_data:/rails/storage
    depends_on:
      - redis

  updater:
    image: audric/svxreflectordashboard_updater
    build: .
    command: bash -lc "bundle exec rails runner 'require Rails.root.join(\"lib\",\"reflector_listener\").to_s; ReflectorListener.start; sleep'"
    environment:
      RAILS_ENV: production
      REFLECTOR_STATUS_URL: ${REFLECTOR_STATUS_URL}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    volumes:
      - db_data:/rails/storage
    depends_on:
      - web
      - redis

  audio_bridge:
    build: ./audio_bridge
    network_mode: host
    environment:
      REFLECTOR_HOST: ${REFLECTOR_HOST}
      REFLECTOR_PORT: ${REFLECTOR_PORT:-5300}
      REFLECTOR_AUTH_KEY: ${REFLECTOR_AUTH_KEY}
      AUDIO_CALLSIGN: ${AUDIO_CALLSIGN:-MONITOR}
      REDIS_URL: redis://localhost:6379/1
      DEFAULT_TG: ${DEFAULT_TG:-1}
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  db_data:
