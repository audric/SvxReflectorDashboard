<!DOCTYPE html>
<html lang="en">
<head>
  <title>Something Went Wrong</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-container { max-width: 480px; }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #f85149, #ff7b72);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 0.75rem;
    }
    .error-message {
      font-size: 1rem;
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .home-link {
      display: inline-block;
      padding: 0.65rem 1.75rem;
      background: #1f6feb;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    .home-link:hover { background: #388bfd; }
    .divider {
      width: 60px;
      height: 3px;
      background: #21262d;
      border-radius: 2px;
      margin: 0 auto 1.5rem;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">500</div>
    <h1 class="error-title">Something went wrong</h1>
    <div class="divider"></div>
    <p class="error-message">
      An unexpected error occurred. The issue has been noted and we'll look into it.
    </p>
    <a href="/" class="home-link">Back to Dashboard</a>
  </div>
</body>
</html>
